# See claude code environment variables documents at https://code.claude.com/docs/en/settings
[env]
GITHUB_TOKEN = "{{ exec(command='uvx --from home-secret-toml hst get yq-github-token') }}"
CODECOV_TOKEN = "{{ exec(command='uvx --from home-secret-toml hst get yq-codecov-api-token') }}"
READTHEDOCS_TOKEN = "{{ exec(command='uvx --from home-secret-toml hst get yq-rtd-token') }}"
PYPI_TOKEN = "{{ exec(command='uvx --from home-secret-toml hst get yq-pypi-token') }}"

_.file = [
  ".env.shared",
  ".env",
]

[tools]
python = "3.12"
uv = "latest"
claude = "latest"
pandoc = "3.9" # Use pandoc 3.9 - latest stable major version as of 2026-04
node = "24"
awscli = "2.34.24"
"npm:aws-cdk" = "2.1119.0"

# === Tasks ===
# Python Environment Management
[tasks.venv-create]
description = "🐍 Create Python virtual environment using uv (creates .venv directory)"
run = "uv venv --allow-existing"

[tasks.venv-remove]
description = "🗑️ Remove Python virtual environment (deletes .venv directory)"
run = "rm -r .venv"

# Dependency Management
[tasks.inst]
description = "💾 Install all Python dependencies using uv (syncs from pyproject.toml and uv.lock)"
depends = ["venv-create"]
run = "uv sync --all-extras"

[tasks.export]
description = "📋 Export Python dependencies to requirements*.txt files using uv (for legacy compatibility)"
run = """
uv export --format requirements-txt --no-dev --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements.txt
uv export --format requirements-txt --extra dev --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-dev.txt
uv export --format requirements-txt --extra test --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-test.txt
uv export --format requirements-txt --extra doc --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-doc.txt
uv export --format requirements-txt --extra mise --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-mise.txt
"""

# Testing
[tasks.test]
description = "🧪 Run CDK integration tests using pytest (no coverage, avoids aws-cdk import overhead)"
run = ".venv/bin/pytest tests/cdk -s --tb=native"
depends = ["inst"]

[tasks.cov]
description = "🧪📊 Run unit tests with code coverage using pytest (generates HTML report in htmlcov/)"
run = ".venv/bin/pytest tests --ignore=tests/cdk -s --tb=native --cov=yq_credit_card_compliance_data_lake --cov-report term-missing --cov-report html:htmlcov"
depends = ["inst"]

[tasks.view-cov]
description = "👀📊 Open code coverage HTML report in browser (requires 'cov' task to run first)"
run = "open htmlcov/index.html"

# Documentation
[tasks.build-doc]
description = "📚 Build Sphinx documentation using sphinx-build (generates HTML in docs/build/html/)"
depends = ["inst"]
run = """
rm -rf docs/build
.venv/bin/sphinx-build -b html docs/source docs/build/html
"""

[tasks.view-doc]
description = "👀📚 Open built Sphinx documentation in browser (requires 'build-doc' task to run first)"
run = "open docs/build/html/index.html"

[tasks.notebook-to-markdown]
description = "📓 Convert Jupyter notebooks to Markdown for AI knowledge base (processes .ipynb files)"
run = ".venv/bin/python .mise/tasks/notebook-to-markdown.py"
depends = ["inst"]

# Building & Publishing & Release
[tasks.build]
description = "🏗️ Build Python package wheel and source distribution using uv (outputs to dist/)"
run = """
rm -rf dist
uv build
"""

[tasks.publish]
description = "🚀 Publish Python package to PyPI using uv (prints PyPI URL after success)"
run = """
.venv/bin/python .mise/tasks/publish.py
uv publish --token $PYPI_TOKEN
"""
depends = ["build"]

[tasks.release]
description = "🏷 Create GitHub release using PyGithub (idempotent: skips if release exists)"
run = ".venv/bin/python .mise/tasks/release.py"
depends = ["inst"]

# CI/CD Setup
[tasks.setup-codecov]
description = "⚙️ Setup Codecov upload token on GitHub Actions secrets using PyGithub and httpx"
run = ".venv/bin/python .mise/tasks/setup-codecov.py"
depends = ["inst"]

[tasks.setup-readthedocs]
description = "⚙️ Setup ReadTheDocs project and GitHub webhook using httpx API client"
run = ".venv/bin/python .mise/tasks/setup-readthedocs.py"
depends = ["inst"]

[tasks.update-github-metadata]
description = "🔧 Update GitHub repository description and homepage using PyGithub"
run = ".venv/bin/python .mise/tasks/update-github-metadata.py"
depends = ["inst"]

# CDK
[tasks.cdk-plan]
description = "🔵 Preview CDK changes then deploy (runs cdk diff followed by cdk deploy)"
dir = "cdk"
depends = ["inst"]
run = """
cdk diff --all
cdk deploy --all --require-approval never
"""

[tasks.cdk-up]
description = "🟢 Deploy CDK stacks to AWS (runs cdk deploy, skip approval)"
dir = "cdk"
depends = ["inst", "lambda-source-deploy"]
run = "cdk deploy --all --require-approval never --profile $LOCAL_AWS_PROFILE"

[tasks.cdk-down]
description = "🔴 Destroy CDK stacks from AWS (force, no confirmation)"
dir = "cdk"
run = "cdk destroy --all --force --profile $LOCAL_AWS_PROFILE"

[tasks.cdk-down-ask]
description = "🟡 Destroy CDK stacks from AWS (with confirmation prompt)"
dir = "cdk"
run = "cdk destroy --all --profile $LOCAL_AWS_PROFILE"

# Lambda DevOps
[tasks.lambda-layer-build-only]
description = "🐳 Build Lambda layer in Docker container (local only — no zip/upload/publish)"
run = ".venv/bin/python .mise/tasks/lambda_layer_1_build_only.py"
depends = ["inst"]

[tasks.lambda-layer-deploy]
description = "🚀 Full Lambda layer pipeline: Build → Zip → Upload S3 → Publish AWS Lambda"
run = ".venv/bin/python .mise/tasks/lambda_layer_1_build_lambda_layer_in_container.py"
depends = ["inst"]

[tasks.lambda-layer-cleanup]
description = "🧹 Clean up old Lambda layer versions (keeps latest 1)"
run = ".venv/bin/python .mise/tasks/lambda_layer_2_cleanup_old_layer_versions.py"
depends = ["inst"]

[tasks.lambda-source-deploy]
description = "📦 Build Lambda source zip using uv and upload to S3"
run = ".venv/bin/python .mise/tasks/lambda_layer_3_build_lambda_source.py"
depends = ["inst"]

# Data Ingestion E2E (manual smoke against real AWS — requires cdk-up first)
# Pass extra CLI args after `--`, e.g.  mise run e2e-producer-test -- -k 50 -t 3
[tasks.e2e-producer-test]
description = "🧪 E2e producer → TEST Kinesis stream (TestStack must be deployed)"
depends = ["inst"]
run = ".venv/bin/python -m tests_e2e.data_ingestion.run_producer"

[tasks.e2e-consumer-test]
description = "🧪 E2e consumer ← TEST Kinesis stream (long-poll, Ctrl+C to stop)"
depends = ["inst"]
run = ".venv/bin/python -m tests_e2e.data_ingestion.run_consumer"

# When this task pushes records to the PROD Kinesis stream, the deployed
# Event Source Mapping (declared in cdk/stacks/lambda_stack.py ::
# s03_configure_kinesis_event_source) invokes the transaction-ingestion
# Lambda (handler in lbd/transaction_ingestion.py, registered via
# Config.lbd_func_transaction_ingestion).  The handler routes each record:
#   - records that pass validation → Bronze S3 prefix
#       defined by one.s3dir_bronze_transactions (one/one_03_s3.py)
#   - records that fail validation or decode → Quarantine S3 prefix
#       defined by one.s3dir_quarantine_transactions (one/one_03_s3.py)
#   both suffixed with `year=YYYY/month=MM/day=DD/{run_id}.ndjson`
#   (build_partition_path lives in data_ingestion/writer/writer_00_base.py)
# It also writes one DynamoDB row per invocation to the table named by
# Config.dynamodb_table_pipeline_metadata (config/config_00_main.py).
[tasks.e2e-producer-prod]
description = "🚨 E2e producer → PROD Kinesis stream — drives the deployed Lambda end-to-end"
depends = ["inst"]
run = ".venv/bin/python -m tests_e2e.data_ingestion.run_producer --prod"

[tasks.e2e-consumer-prod]
description = "🚨 E2e consumer ← PROD Kinesis stream (debug tap; Lambda still gets the records)"
depends = ["inst"]
run = ".venv/bin/python -m tests_e2e.data_ingestion.run_consumer --prod"
